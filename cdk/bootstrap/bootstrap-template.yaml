Outputs:
  BucketName:
    Description: The name of the S3 bucket owned by the CDK toolkit stack
    Value:
      Fn::Sub: ${StagingBucket}
  BucketDomainName:
    Description: The domain name of the S3 bucket owned by the CDK toolkit stack
    Value:
      Fn::Sub: ${StagingBucket.RegionalDomainName}
  FileAssetKeyArn:
    Description: The ARN of the KMS key used to encrypt the asset bucket (deprecated)
    Value:
      Fn::If:
        - CreateNewKey
        - Fn::Sub: ${FileAssetsBucketEncryptionKey.Arn}
        - Fn::Sub: ${FileAssetsBucketKmsKeyId}
    Export:
      Name:
        Fn::Sub: CdkBootstrap-${Qualifier}-FileAssetKeyArn
  ImageRepositoryName:
    Description: The name of the ECR repository which hosts docker image assets
    Value:
      Fn::Sub: ${ContainerAssetsRepository}
  BootstrapVersion:
    Description: The version of the bootstrap resources that are currently mastered in this stack
    Value: '30'
  BootstrapPolicyVersion:
    Description: The version of the ABCA bootstrap policy bundle
    Value: 1.1.0
  BootstrapPolicyHash:
    Description: SHA-256 hash of the ABCA bootstrap policy bundle for drift detection
    Value: a24d14dde94c546fdf94c7839492e92f612ae91def4660aaacab48d8e8da3146
  BootstrapPolicySet:
    Description: Comma-separated list of active ABCA bootstrap policy names
    Value:
      Fn::Join:
        - ','
        - - Infrastructure
          - Application
          - Observability
          - Compute-Agentcore
          - Fn::If:
              - IncludeComputeEcs
              - Compute-ECS
              - Ref: AWS::NoValue
