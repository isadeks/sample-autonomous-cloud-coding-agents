version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): actions"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): docker"
    open-pull-requests-limit: 1
    groups:
      all-docker:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): uv"
    open-pull-requests-limit: 1
    groups:
      all-python:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directories:
      - "**/*"
    schedule:
      interval: "weekly"
      day: "saturday"
    commit-message:
      prefix: "chore(deps): npm"
    open-pull-requests-limit: 1
    groups:
      all-npm:
        patterns: ["*"]
